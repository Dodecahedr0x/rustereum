name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --features rustereum/testing

      # The OpenZeppelin examples depend on OZ sources, which are NOT committed.
      # Each example project has its own rustereum.toml; fetch clones its deps
      # into that project's own lib/ and generates its remappings.txt before the
      # tests that compile through solc.
      - name: Fetch example Solidity dependencies
        run: |
          for dir in examples/openzeppelin/*/; do
            if [ -f "${dir}rustereum.toml" ]; then
              echo "Fetching deps for ${dir}"
              (cd "$dir" && cargo run -q -p rustereum-cli -- fetch)
            fi
          done

      # Runs every crate's tests, including the revm end-to-end examples.
      # solc is downloaded on demand by foundry-compilers.
      - name: Test workspace
        run: cargo nextest run --workspace --features rustereum/testing

      - name: Macro diagnostic (compile-fail) tests
        run: cargo test -p rustereum --test ui
